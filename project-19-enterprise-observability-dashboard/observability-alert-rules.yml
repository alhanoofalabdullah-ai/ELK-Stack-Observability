groups:

- name: ObservabilityAlerts

  rules:

  - alert: ServiceAvailabilityLow
    expr: service_availability < 99

  - alert: HighErrorRate
    expr: error_rate > 5

  - alert: LatencyThresholdExceeded
    expr: request_latency > 500

  - alert: ErrorBudgetExhausted
    expr: error_budget_remaining < 10

  - alert: ServiceDependencyFailure
    expr: dependency_failures > 0
