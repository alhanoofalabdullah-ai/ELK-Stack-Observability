groups:

- name: CommandCenterAlerts

  rules:

  - alert: CriticalIncidentDetected
    expr: active_incidents > 0

  - alert: InfrastructureFailure
    expr: infrastructure_availability < 99

  - alert: SecurityBreachDetected
    expr: critical_security_events > 0

  - alert: CloudResourceExhaustion
    expr: cloud_utilization > 90

  - alert: BusinessKPIFailure
    expr: business_health_score < 80
