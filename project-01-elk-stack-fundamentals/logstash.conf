input {

  file {

    path => "/logs/application.log"

    start_position => "beginning"
  }
}

filter {

  grok {

    match => {

      "message" => "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:level} %{GREEDYDATA:message}"
    }
  }
}

output {

  elasticsearch {

    hosts => ["http://elasticsearch:9200"]

    index => "application-logs"
  }

  stdout {}
}
