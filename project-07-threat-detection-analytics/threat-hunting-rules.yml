rules:

  - name: BruteForceAttack

    condition:

      failed_logins > 10

    severity: critical

  - name: PrivilegeEscalation

    condition:

      unauthorized_admin_access == true

    severity: critical

  - name: MalwareActivity

    condition:

      ioc_match == true

    severity: critical

  - name: LateralMovement

    condition:

      multiple_host_connections == true

    severity: critical
