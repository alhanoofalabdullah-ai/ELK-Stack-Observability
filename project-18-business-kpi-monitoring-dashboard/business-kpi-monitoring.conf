input {

  file {

    path => "/data/*.csv"

    start_position => "beginning"
  }
}

filter {

  csv {

    autodetect_column_names => true
  }

  mutate {

    add_field => {

      "platform" => "business-kpi-monitoring"
    }
  }
}

output {

  elasticsearch {

    hosts => ["http://elasticsearch:9200"]

    index => "business-kpis"
  }

  stdout {}
}
