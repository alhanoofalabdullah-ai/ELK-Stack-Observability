version: "3.9"

services:

  elasticsearch:
    image: elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
    ports:
      - "9200:9200"

  kibana:
    image: kibana:8.13.0
    ports:
      - "5601:5601"

  logstash:
    image: logstash:8.13.0
    volumes:
      - ./logstash:/usr/share/logstash/pipeline
      - ./logs:/logs

  audit-monitor-api:
    build: ./audit-monitor-api
    ports:
      - "8080:8080"
